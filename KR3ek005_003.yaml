body:
  text: 卷下漏蘆湯治一切惡瘡毒腫丹瘤瘰癧疔腫魚睛五發瘭疽初覺一二日便如傷寒頭痛煩渴拘急惡寒肢體疼痛四肢沉重恍惚悶亂坐臥不寧皮膚壯熱大便祕澀小便赤黃並宜服之妊身莫服漏蘆白蘞黃芩去黑心麻黃去節枳實麩炒去穰升麻芍藥甘草炙朴硝以上各一兩大黃二兩上除硝外余㕮咀與硝同和勻每服三錢氣實人五錢水一盞半文武火煎七沸去渣空心熱服化毒丹治百種惡瘡毒腫初覺一二日咳逆煩悶或咽喉閉塞發熱惡寒沒藥乳香以上各五錢另研草烏頭醋浸泡製浮石以上各一兩燒赤醋淬七次研余醋另放巴豆四十九個去皮生用另研上五味為細末用浮石烏頭余醋打麵糊為丸如豌豆大每服五七丸食後冷酒送下忌熱飲取快利三二行或吐出惡為效內消丸治瘡腫初生及瘰癧結核熱毒鬱滯服之內消矣大效青皮陳皮以上各二兩牽牛八兩取頭末二兩薄荷葉皂角以上各八兩不利者去粗皮錘碎二味水一斗煮令極軟揉汁去渣用熬成膏上將青皮陳皮末並牽牛末和勻用前膏子和丸如緑豆大每服三十丸食後荊芥茶清溫水皆可下之五利大黃湯治人年四十以前氣血盛多若患瘡疽大小便祕大黃根黃芩去腐升麻以上各二兩芒硝梔子以上各一兩二錢上㕮咀每服五錢水一盞半煎五七沸去渣空心稍熱服內消升麻湯治證同前大黃升麻當歸黃芩去腐枳實炒去穰芍藥以上各二兩五錢甘草炙一兩五錢上㕮咀每服五錢水一盞半煎至七分去渣食前稍熱服五香連翹湯如不用五香曰七味連翹湯治證同前沉香藿香葉木香丁香以上各一兩麝香一字五味為粗末另研連翹射干獨活升麻甘草炙寄生草以上各一兩大黃一兩五錢上七味㕮咀與前五味和勻每服五錢水一盞半煎至一盞去渣溫服取利為效未利則再服食前牡蠣大黃湯治證同前牡蠣木香大黃煨以上各等分上㕮咀每服五錢水一盞半煎至七分春夏露溻一宿於雞鳴時空心服之冬月於暖處放一宿婦人重身者勿服此藥快利三兩行便勿服以上五方對證選用和血通氣丸治證同前人參一兩麥門冬去心二兩大黃黃芩去核黃柏以上各四兩牽牛一斤炒香取頭末四兩上六味為細末煉蜜為丸如豌豆大每服二三十丸食後溫水送下尋常積熱之人隔三二日服此藥微利潤動永不生瘡腫如已早覺者服之亦得內消矣地黃煎丸治臟腑有熱胸膈痰實血氣不和經絡祕澀多生瘡腫已患惡瘡毒腫大小便結澀生地黃新者十兩洗水浸研如泥黃連五兩黃芩去腐三兩枳殼炒去穰大黃以上各二兩五錢人參二兩上除地黃煎外併為細末再和地黃煎和搗入煉蜜丸如豌豆大每服五七十丸食後溫水下素有熱之人日服百餘丸不發瘡瘍年高氣弱之人亦宜常服清利胸膈明目槐角煎丸治瘡瘍瘰癧疥癬赤腫等瘡天麻川芎甘草炙黃藥子甘菊花人參以上各一兩何首烏苦參以上各一兩五錢荊芥穗防風以上各二兩槐角並仁另放皂角不蛀者以上各四兩水一斗煮軟揉汁去渣取仁熬成膏子其皂角取肉研成膏子為用者上除皂角膏外槐仁與諸藥為細末入膏內溲和煉蜜為丸如豌豆大每服五十丸食後竹葉湯下皂角煎丸治風毒瘰癧皂角不蛀者三十錠內十錠炮黑十錠酥炙十錠用水一斗煮軟揉汁用度何首烏玄參薄荷葉以上各四兩上為細末與前膏子同煉蜜為丸如豌豆大每服三四十丸食後溫水送下苦參散出野夫多效方治遍身瘡疥經年不效苦參蔓荊子何首烏荊芥穗威靈仙以上各等分上為細末每服二錢食前酒調下日進二服忌發風物苦參丸治證同前山梔子仁苦參防風玄參獨活枳實甘菊花黃連去須黃芩去心大黃以上各等分上為細末煉蜜為丸如豌豆大每服五十丸茶酒任下食後服肺風丸全體治世方治面鼻風㾴及皶查包細辛旋覆花羌活以上各一兩晚蠶蛾去翅足苦參以上各二兩上為細末軟飯和丸梧桐子大每服五十丸茶酒任下不拘時連翹散治瘡瘍癤腫一切惡瘡疼痛煩渴大便溏泄虛熱不寧連翹山梔子甘草防風以上各等分上為粗末每服三錢水一盞煎至七分去渣溫服不拘時候竹葉黃耆湯出總録一百二十一治諸癰疽發背煩渴及一切惡瘡發大渴者淡竹葉二兩黃耆當歸川芎甘草黃芩去心芍藥人參麥門冬去心半夏湯洗石膏以上各三兩生地黃八兩上為粗末每服五錢水一盞半竹葉五片生薑五片煎至一盞去粗溫服枳殼丸出總録治瘡疽熱癰腫瘰癧枳殼麩炒去穰牽牛炒取頭末木香青皮以上各一兩甘草大黃上為細末用皂角長一尺許者三錠約三兩炮焦捶碎以好酒煮軟挪取汁熬膏稠黏和前藥末為丸如梧桐子大每服三五十丸食後蔥茶下日進二服五香湯出總録治諸瘡毒氣入腹托裡丁香木香沉香乳香以上各一兩麝香三錢嘔者去麝香加藿香渴加人參以上各一兩上為細末每服三錢水一盞煎至六分去渣空心稍熱服總録聖惠千金外臺治諸瘡腫方中皆載此方大同小異大抵專治毒氣入腹煩悶氣不通者其餘熱渴昏昧口燥咽乾大便硬小便澀者未可與服托裡黃耆湯出總録治諸瘡潰後膿多內虛茯苓去皮人參官桂去肉遠志去心麥門冬去心五味子炮黃耆當歸以上各等分上為粗末每服五錢水一盞半煎至一盞去渣溫服食前托裡茯苓湯防風桔梗芍藥五味子川芎甘草麥門冬去心桂去皮熟地黃以上各一兩當歸黃耆茯苓以上各一兩五錢上為末每服五錢水一盞半煎至一盞去渣溫服托裡當歸湯太醫瘡科何君五方當歸黃耆人參熟地川芎芍藥甘草炙柴胡己上各等分上為粗末每服五錢水一盞煎至六分去渣食前溫服托裡散出太醫瘡科成子玉方川烏頭炮茯苓以上各三兩乾薑炮麻黃去節甘草炙以上各一兩五錢杏仁炒去皮尖五味子桂心以上各一兩上為粗末每服五六錢水一盞半煎至一盞去渣食前溫服托裡玄參散出總録主托裡止渴解熱煩渴玄參人參甘草炙甘菊花以上各等分上為細末每服二錢緑豆湯調下亦名內托散內托散洪氏有芍藥總録無芍藥亦名生肉芎藭散治癰疽潰後內虛者或氣弱人初覺生瘡瘍亦可服內消宜詳細用之當歸芎藭黃耆厚朴去皮桔梗防風甘草炒官桂人參白芷芍藥以上各一兩上為細末每服三錢溫酒調下或木香湯亦可內補散聖惠六十一總録一百二十八無川芎黃耆麥門冬去心川芎當歸茯苓去皮人參五味子以上各一兩遠志去心甘草炙桂心以上各五錢上㕮咀每服五錢水一盞半生薑三片棗三枚煎八分溫服無時內塞散總惠二百二十三萬全方中去附子用天雄治疳瘻不瘥諸瘡附子二個炮官桂去皮赤小豆甘草炙黃耆當歸茯苓防風白芷桔梗川芎人參遠志去心厚朴以上各一兩上為末每服二錢溫酒調下空心日進一服香粉散主托裡止痛解煩渴退虛熱真緑豆粉三兩南乳香一兩上為細末每服三錢新水調下止痛當歸湯出總録一百三十治腦疽發背穿潰疼痛當歸黃耆人參官桂芍藥甘草炙生地黃以上各一兩上為粗末每服五錢水一盞半煎至一盞去渣溫服日進三服黃耆茯苓湯出總録一百二十治諸瘡潰後托裡除虛熱黃耆白茯苓官桂去皮麥門冬五味子川芎以上各一兩上為粗末每服五錢生薑三片棗一枚水一盞半煎至一盞去渣溫服食前日進三服內補防風散附子二個炮裂去皮臍防風茯苓白芷桔梗川芎當歸人參甘草炙遠志官桂去皮黃耆以上各一兩厚朴二兩生薑汁製赤小豆半斤酒浸一宿上為細末每服三錢溫酒調服伏梁丸出養生必用方治環臍腫痛腸胃瘡疽厚朴生薑汁製茯苓枳殼麩炒去穰白朮荊三稜炮半夏湯洗七次人參以上各一兩溫經丸出前方治陷脈瘻厚朴官桂去皮白朮甘草乾薑炮木香以上各一兩附子二兩醋浸炮淬七次去皮臍上為細末煉蜜和丸如梧桐子大每服三十丸食後飲湯下木香溻腫湯治諸瘡疽始發腫焮增長熱痛木香犀角大黃梔子仁升麻黃芩黃連射干黃柏白蘞甘草炙朴硝紫檀羚羊角以上各一兩上㕮咀入生地黃汁五合如無只用生乾地黃五兩銼碎和勻每用藥五兩水一斗煎至七升入麝香五錢淨帛蘸藥熱拓腫上日兩三度冷即再換升麻溻腫湯升麻黃耆防風川芎生地黃細辛以上各等分上㕮咀用藥二兩水二升煎十沸稍熱淋溻內消如神溻腫升麻湯出總録淋溻條下升麻芒硝黃芩漏蘆梔子仁蒴藋上㕮咀每用藥二兩水三升煎十沸帛蘸藥溻漬腫處豬蹄湯出聖惠方升麻甘草芍藥蒴藋以上各等分上㕮咀每用藥四兩水一斗豬蹄一對煮蹄軟取出次下藥再煎十沸帛蘸淋溻之甘草大豆湯出聖惠方治外陰蝕下疳湮瘡腫痛甘草三兩赤皮蔥三莖大豆一合上用水三升煮豆熟為度用槐條一握同煮取清汁熱淋浴冷即再溫浸三二時為度大效溻腫湯芍藥丹參黃芩去黑心白蘞以上各等分上㕮咀用藥五錢水一升煎十沸帛蘸頻溻之洗毒湯苦參防風甘草炙露蜂房以上各等分白芷上㕮咀水煎濃汁洗瘡腫浴毒湯出拾遺衛生方治小腸風陰瘡癢痛木通藁本枳殼貫衆白芷荊芥甘松薄荷以上各等分上㕮咀用藥二兩水五升入芒硝半兩煎至三升熱洗浴瘡何首烏散出祕寶生方治遍身瘡腫癢痛防風苦參何首烏薄荷以上各等分上為粗末每用藥半兩水酒各一半共用一斗六升煎十沸熱洗便於避風處睡一覺其痛甚者三日痊愈八仙散出衛生方治遊風腫癢疥癬瘡或因洗頭遊風瘙癢生瘡細辛荊芥白芷川芎黃芩防風甘草地骨皮以上各等分上為粗末每用藥二兩水二碗煎十沸去渣熱淋溻患處消毒湯治百雜瘡腫悉能內消獨活防風細辛藁本川芎枸杞子荊芥漏蘆大黃黃芩去腐官桂苦參威靈仙丹參黃耆當歸芍藥茯苓黃連無心草黃柏麻黃葛根蒴藋菊花杜仲地骨皮秦皮菵草甘草甘松藿香白芷露蜂房升麻零陵香以上各一兩蒼朮三兩朴硝五兩菖蒲八兩上為粗末每用藥半兩水二升蔥三莖槐柳枝各一握同煎十餘沸去渣熱淋洗浴此藥用之如神尉風散出玉於子中箱集羌活防風白芷當歸芍藥細辛芫花吳茱萸官桂以上各等分上為粗末作二劑赤皮蔥連須切半斤同釅醋拌勻炒令極熱帛裹於瘡上尉之稍冷即換藥尉之上下痛止而已應痛丸治走注疼痛疑是附骨疽者蒼朮去皮當歸草烏頭炮黑牽牛以上各一兩上為細末用醋糊為丸如小豆大每服二十丸空心醋湯送下黃耆丸治腎臟風虛攻注手足頭面麻痹痛癢或生疥癬腫焮黃耆烏藥茴香炒地龍去土川椒去目防風川楝子炒赤小豆白蒺藜去刺海桐皮威靈仙陳皮以上各等分上為細末酒糊為丸如梧桐子大每服三十丸空心溫酒送下梔子仁湯出普濟生靈方治時氣頭面赤腫鬱金枳殼去穰升麻梔子仁牛蒡子大黃以上各一兩上為細末每服三錢蜜水調下葛根牛蒡子湯治時毒大頭病是也葛根貫衆甘草鹽豉牛蒡子以上各一兩上為細末每服三錢用水調下此疾近代患者傳染多致夭枉治之者少得方法只云太熱必然殊不知亦有虛實表裡治之者詳其汗下吐不同大抵與傷寒頗類其中亦有可針鐮砭射出血者亦有久而敗爛出膿者其間變異百端不可不慎所宜時疾也通氣散治時氣頭面赤腫或咽喉閉塞不通用之取嚏噴七八遍泄出其毒則瘥若看病之人用此藥必不傳染玄胡一兩五錢豬牙皂角川芎以上各一兩藜蘆五錢躑躅花二錢五分上為細末每用紙捻子蘸一米許紝於鼻中取嚏為效白丁香散治婦人吹奶初覺身熱頭痛寒熱及胸乳腫硬是其候也服之能令下其乳汁通其血脈立能自消矣白丁香直者上為細末每服二錢酒調服腫硬立消甚者不過三服金銀花散治發背惡瘡托裡止痛排膿金銀花四兩無花用苗葉嫩莖代之甘草一兩上為粗末分為三服酒水各一盞同煎至一盞去渣溫服無時皂蛤散治婦人因露風邪氣外客於乳內始為吹奶積久不消以為奶癰此藥導其汁散其風邪汗出其病自然痊愈矣皂角不蛀者燒存性真蛤粉以上各等分上為細末每服二錢溫酒調下不拘時候十香膏治五發惡瘡結核瘰癧疳瘻疽痔沉香麝香以上各一錢木香丁香乳香甘松白芷安息藿香零陵香各五錢同為細末當歸川芎黃耆木通芍藥細辛升麻白蘞獨活川椒藁本菖蒲厚朴木鱉子官桂商陸根各二兩銼碎桃仁杏仁柏子仁松子仁各五錢槐枝桑枝柳枝松枝各二兩銼沒藥輕粉雄黃硃砂雲母石生犀角亂髮灰白礬灰各二兩另研如粉真酥豬脂羊腎脂各二兩黃丹一斤清芝麻油三斤上先於木炭火煉油香熟下一十六味銼碎藥並四枝四仁熬至紫黑色出火濾去渣入脂酥煎十餘沸再以新綿濾過油澄清拭鐺令淨再入火上煎油沸下丹用濕柳枝作簞子不住攪熬一日滴在水中成珠不散則成也離火入十味藥末攪勻再上火入雲母等粉八味輕煎令沸出火不住攪一食時於瓷盒內密封收每用量瘡口大小緋帛上攤貼之腸胃癰疽可作丸梧桐子大每服七丸空心溫酒送下犀角膏當歸川芎黃耆白芷白蘞杏仁木鱉子官桂乳香沒藥以上各一兩亂髮灰五錢黃丹清油五斤上前八味細銼於油內先浸一宿於木炭火上熬至白芷杏仁焦濾去渣澄清再煎油沸下丹以濕柳木簞子不住攪旋滴藥在水中如珠不散出火候一時辰下乳香沒藥併發灰攪勻於瓷盒內收依常法攤用之乳香膏治一切惡瘡打撲走注疼痛乳香研珠子瀝青白蠟以上各五錢白膠香二兩杏仁油一斤上將瀝青於木炭火上先溶開下白膠香黃蠟化開入油攪勻以綿濾去渣於井花水中持拔白色如銀再溶入乳香在內拔白色收瓷盒內依常法攤用之白龍膏治頭面五發惡瘡及燒湯凍破潰爛止痛生肌清血脈消毒敗腫通氣脈如神至可無瘢痕輕粉五錢另研白薇白芷白蘞黃耆商陸根柳白皮桑白皮以上各一兩乳香二兩另研定粉另研黃蠟以上各八兩杏子油一斤如無用芝麻油上七味銼油內揉浸三日於木炭火上煎令白芷黃色濾去渣於油中下黃蠟乳香後溶開出火再濾候微冷下輕粉定粉急攪至冷瓷盒內收貯每用緋絹上攤用之消毒膏當歸黃耆川芎杏仁白芷白蘞零陵香槐白皮柳枝嫩者木鱉子用仁甘松以上各五錢銼乳香沒藥以上各三錢輕粉一錢硃砂硃紅以上各五分麝香一分黃丹炒紫色黃蠟以上各八兩芝麻油一斤上將銼藥油浸七日木炭火上煎杏仁焦色濾去渣下黃蠟候溶開出火下丹急攪百十轉下乳香麝香硃砂等六味不住手攪至凝瓷盒內收貯白光絹上攤之治證如白龍膏之類貼面目毛髮最宜用之磨風膏治頭面五發瘡腫疥癬等疾及湯火破傷磨風止痛滅瘢痕白附子白芍藥白茯苓零陵香白芨白蘞白芷白檀藿香升麻細辛黃耆甘草杏仁去皮尖以上各五錢腦子一分栝蔞根一兩大栝蔞二兩去皮黃蠟六兩芝麻油一斤上先藥十四味銼油內浸百日於臘月慢木炭火上銀石器內煎至白芷微黃色離火入栝萎二味著內煮百沸重綿濾去渣再慢火上煉油香下削淨黃蠟溶開為度傾在瓷器內收貯上糝腦子密封旋用磨風塗之天麻膏治疥癬赤禿手足癬皮剝起瘑疼疳瘡侵蝕痛膿汁浸淫滋蔓經久不瘥者草烏頭釣苓根木鱉子天麻藜蘆川芎狼毒以上各五錢輕粉粉霜以上各二分另研臘豬脂二兩黃蠟六兩油一斤上前七味細銼如麻豆大於油內煎至焦紫色令冷濾去渣上火入黃蠟豬脂溶開再用重綿濾過入輕粉粉霜攪凝瓷盒內收貯用以塗摩之大效善應膏出南京寶梵院明昌六年聞進方當歸白芨官桂白蘞白芷杏仁去皮尖木鱉子仁以上各一兩銼碎乳香沒藥以上各五錢研黃丹二斤芝麻油五斤上先將油煎銼藥令白芷焦黃濾去渣再煎油沸下丹用濕柳簞子不住手攪滴在水中成珠子住火入乳香沒藥攪勻以瓷盒內收貯依常法用之靈應膏出總録治五發惡瘡瘰癧結核乳癰白麥飯石燒醋淬七次白蘞以上各五兩鹿角十兩燒存性上為細末每用釅醋中熬如膏厚塗於上中心留一竅以出其毒以故舊軟布攤之貼未成膿者貼即自消已成膿者便潰惡肉疾出新肉早生效不必具陳用之如神翠玉膏治軟癤膿水逗留愈後復發明瀝青四兩銅碌二兩芝麻油三錢猔豬膽三個上先於炭火上溶開瀝青入油令沸下膽汁攪勻入水中用手搏搦瓷盒內收貯用於緋光絹上量瘡大小攤貼之不須再換一上便痊可自落為度追毒散太醫成子玉方治一切惡瘡膿水不快者五靈脂川烏頭炮白乾薑炮以上各一兩全蠍五錢上為細末用少許糝瘡口中深者紙捻蘸藥紝於瘡口內以膏貼之或浸蒸餅令浸透搦去水和藥合勻捻作錠子每用紝入瘡口中亦名追毒錠子回瘡錠子治疔瘡大效草烏頭一兩蟾酥七錢巴豆七分去皮麝香一字上為細末麵糊和捻作錠子如有惡瘡透疔不痛無血者用針深刺到痛處有血用此錠子紝之上用膏貼之疔瘡四畔紝之其疔三二日自然拔出此藥最當緊用射膿丸治諸瘡癤膿水已成即當針開決出陳臭惡瘀則其活也若其惡瘀不出欲針口須當開發用此藥以射出其膿也白礬灰一錢砒霜五分黃丹一字上為末麵糊為丸捻作錠子每用黏瘡頭欲出處以膏貼之自潰替針丸出保生信妨方治證同前陳壞米末一錢硇砂五分雄雀糞直者二千一粒上為細末粳米粥丸如粳米樣每用一丸黏在瘡頭上以膏貼之治瘰癧並馬老鼠瘡銅碌斑蝥砒霜以上各五分上為細末醋糊為丸如鼠糞大每用時一錠子作三丸納於瘡口上以膏貼之如無瘡口干糝之妙翠霞散治百雜惡瘡去毒生肌滑石銅碌五錢輕粉二錢片腦麝香以上各三分粉霜一字上為細末每蘸藥紝於瘡口上以膏貼之或滑石二兩名二聖散量其淺深輕重用之搜膿散治年深不效惡瘡白芷一兩芎藭二兩白芍藥三兩輕粉三錢上為細末每用干糝瘡口上瘡口深者紝之引膿散治證同前狼毒釣苓根無心草根白丁香以上各五錢麝香一字上為細末如前法用治之乳香散治證同前白乾薑苦丁香草烏頭以上各五錢釣苓根狼毒乳香以上各一兩上為細末每用干糝之或唾調作錠子紝入瘡內釣苓散陳宮寶方治證同前井鹽一兩無心草乾薑以上各二兩釣苓根三兩上為細末每用干糝之或唾調少許塗在膏上就貼之截疳散治年深疳瘻瘡大效密陀僧白蘞白芨黃丹以上各一兩黃連五錢輕粉一錢腦子麝香以上各五分上前四味為細末後四味另研極細和勻為散每用或糝或紝瘡口中以膏貼之抵聖散治耳中膿經年不愈及驢涎馬汗攻焮瘡瘍骨疽疳瘻等瘡白礬灰一兩烏魚骨三錢乳香二錢干胭脂輕粉以上各一錢麝香五分上為細末或糝或紝以膏貼之如有耳膿者用一字紝耳中青金錠子治諸惡瘡膿出不快者及多年疳瘻瘡愈而復發白丁香銅青硇砂粉霜輕粉以上各五分麝香龍腦以上各一字上為細末麵糊為丸捻作錠子每用紝入瘡口中膿水出快白龍散主生肌止痛及耳中卒然大痛寒水石四兩燒半白研烏賊魚骨研滑石以上各一兩研硼砂三錢輕粉一錢上為細末每用干糝耳中痛者油調如糊滴紝於耳中痛立止桃紅散主斂瘡生肌定血僻風邪滑石四兩寒水石燒二兩小豆粉一兩乳香輕粉以上各一錢上為細末每用干糝血不止者和燈草貼瘡口上以帛封之檳榔散治久患惡瘡肌肉遲生木香黃連檳榔以上各等分上為細末每用干糝之金黃散出管籥生方主消腫散毒生肌止痛黃連大黃黃耆黃芩黃柏鬱金以上各一兩甘草五錢龍腦五分另研上為細末入龍腦研勻若治濕毒丹腫新水調掃赤上或蜜水調如稀糊用小紙花子貼之或小油調掃如久不瘥熱瘡毒赤干糝或水調塗亦佳生肌散主斂瘡大效寒水石燒滑石以上各二兩龍骨烏魚骨以上各一兩密陀僧枯白礬干胭脂定粉以上各五錢上為細末用藥干糝瘡口上水澄膏治熱毒腫痛大效大黃黃柏鬱金天南星白芨朴硝黃蜀葵花以上各一兩上為細末每用新水一盞半藥末二錢攪調勻候澄底者去浮水以紙花子攤於腫焮處貼之如急燥津唾潤之此藥治熱毒赤腫神效如皮膚白色者勿用之拔毒散治熱毒丹腫遊走不定寒水石生用石膏生用以上各四兩黃柏甘草以上各一兩上為細末每用新水調掃之或油調塗之或紙花子小貼亦妙涼水潤之金露散出普降生靈方治時氣熱毒寒水石生用一兩五錢黃柏一兩白芨白蘞雄黃以上各二錢五分上為細末無根水調以紙花子貼或掃亦妙消毒散治諸惡瘡生肌止痛消毒散腫滑石一斤黃柏二兩黃丹一兩乳香五錢輕粉三錢上為細末每用干糝或燒湯及下注臁瘡風濕疥癬等瘡油調塗之大檳榔散成子玉方治乾溼疥癬硫黃黑狗脊以上各五錢輕粉一錢紅娘子大檳榔以上各一個上為細末每用藥末半錢於手掌中臨臥時油調如糊兩手搓摩極熱鼻內聞之及摩擦疥上隔日再用甚者不過三上必驗天麻散治白禿疳瘡及風毒疥癬藜蘆天麻狼毒白芷菵草釣苓根草烏頭管仲細辛以上各五錢雄黃二錢輕粉一錢上為細末每用藥半兩紙一重綿裹油三兩浸三日外蘸指擦患處如稍干添油一兩添至三兩換藥其效如神決效散治風癢頭瘡管仲三兩白芷一兩上為細末油調塗之水銀膏治瘑瘡疥癬無名惡瘡但是手足瘡疥浸淫多汁久而蟲生塗之神效䕡茹銼黃蠟以上各一兩黃連銼蛇床微炒白礬枯水銀以上各二兩上用臘豬脂七兩熬開下三件銼藥煮至焦紫色去渣再入黃蠟溶開出火稍凝下水銀礬石攪至勻每用塗摩平肌散治諸瘡久不斂者密陀僧花蕊石二味同煅赤色白龍骨以上各一兩黃丹乳香黃連以上各二錢五分輕粉一錢上為細末入乳香輕粉黃丹同研令勻每用干糝神黃散治一切熱腫攻焮疼痛黃柏末一斤黃丹二兩炒紫色雄黃一兩另研上同研勻每用新水調如糊敷掃以小紙花貼稍干以蜜水潤之博金散治下疳蝕臭爛腫痛白礬與密陀僧同為末相和於沙鍋內火上炮汁盡密陀僧以上各五錢白堊二錢黃丹輕粉以上各一錢乳香五分麝香一字上為細末先須另用槐枝蔥白鹽甘草熬湯淋溻洗一二時淹干糝上項藥每用藥先須洗浴然後糝藥甚者三五次瘥金傷散治刀鐮斧傷僻風止痛生肌白芨三兩陳石灰風化桑白皮黃丹以上各二兩白附子天南星龍骨以上各一兩上為細末每用干貼之完肌散治證同前密陀僧桑白皮新者龍骨以上各四兩陳石灰二兩黃丹五錢麝香一錢另研上為細末干糝之定血散治證同前黃丹一兩烏魚骨白礬灰龍骨以上各二兩密陀僧半斤桑白皮一斤上為細末每用干糝定血如神碧霞錠子太醫陳官寶方治惡瘡透不覺疼痛銅碌一兩硇砂二錢蟾酥一錢上為細末軟米飯一處擦勻捻作錠子粳米樣每用針刺之不覺痛者但有血出紝一錠子在內以膏貼之或作散以紙捻蘸紝之亦可臨證看如何宜合用度漏蘆湯治婦人吹奶初覺漏蘆練實大黃黃芩芍藥甘草以上各五錢上為粗末每用三錢水一盞半燈草三十莖同煎至一盞去渣溫服無時王粉散出蘇注螵方白礬灰定粉以上各等分上研細末先洗浴淨淹干敷糝之香礬散治小兒斷臍之後不幹及膿出耳中枯礬五錢龍骨黃丹以上各一錢麝香少許研上為細末每用干糝之紫金散治瘰癧久不瘥者枯礬五錢砒霜一錢石膽五分上為細末入黃丹二錢每用維人瘡口內以膏貼之如未破者灸一兩炷用聿尾旋調一豆許安瘡上以膏貼之去根自平復通耳丹盧全寶傳治耳聾桑螵蛸安息香阿魏以上各一錢五分硃砂五分萆麻子仁大蒜巴豆仁以上各七個上為細末入二仁與蒜同研爛為丸如棗核樣每用一丸綿裹內耳中如覺微痛即取出親驗方菖蒲錠子一名菖蒲散治耳中卒痛菖蒲附子炮去皮臍以上各二兩上為細末每用油調滴耳內立效寸金錠子太醫陳子寶方治療痔疾藤黃雄黃雌黃硫黃輕粉粉霜麝香砒霜黃丹以上各一錢牡蠣粉紅藤根乾漆以上各五錢上為細末研勻燒陳米飯和搗為丸如棗核大每用一丸內肛門中深二寸許放令定用新磚球子二個炭火燒赤釅醋中蘸過綿裹一個於肛門上尉之冷即換上下次之來日大便下臭敗惡物除根也熏痔散威靈仙三兩上用水一斗半煎至七八沸去火就盆上坐令氣熏之候通手淋溻冷即再暖通靈丸治耳聾松脂五錢巴豆二十四個去皮研上先將松脂溶開入巴豆末熬成膏丸如白頭大綿裹一丸塞耳中覺痛取出毒水為效三神丸治僧道痔疾因讀養生必效方見干義傳僧覺海少年患痔疾其行業比米霜緣此飽食久坐知痔疾者不必酒色過度矣故素問云因而飽食筋脈橫解腸澼為痔治之故不同也枳殼炒去穰皂角燒存性五倍子以上各等分上為細末煉蜜為丸如梧桐子大每服三二十丸溫水食前服養生必效方中三味皆單方一味為方今增為一方其效如神玉芝飲子治膈熱口舌生瘡咽喉腫痛甘草炙二兩藿香葉石膏水飛山梔子仁以上各一兩上為細末每用一錢新水調下平和飲子出顱囪經中治小兒瘡疹人參白朮茯苓甘草升麻以上各等分上為細末每服一二錢水煎去滓溫細細飲之量歲大小虛實以意詳之此藥治諸瘡疼煩渴不寧者皆可服之惟小兒瘡疹尤佳玄參丸出僧居泰傳治口瘡連年不愈者天門冬去心麥門冬去心玄參以上各等分上為細末煉蜜為丸如彈子大每服一丸噙化犀角散活口舌生瘡咽喉腫痛熱毒時氣升麻桔梗甘草炙以上各一兩牛蒡子炒四兩上為細末每服三錢水一盞入竹葉五七片煎至七分去渣細細熱漱溫即咽之去渣熱掃項腫上防風散治破傷瘡瘍風邪或身體疼痛風邪攻注攣急及皮膚搔癢麻木不仁頭昏悶牙關緊欲成破傷風防風一兩藁本羌活地骨皮荊芥穗以上各五錢上為細末每服三錢溫酒調下烏金散治疳瘻惡瘡麝香蟾酥以上各一字粉霜硇砂輕粉以上各一錢銅碌砒霜白乾薑草烏頭天南星舶上硫黃以上各五錢上為細末紙捻紝之或湯浸蒸餅和為錠子紝瘡口內以上膏貼之劉守真瘡論素問云痛癢瘡瘍癰腫疽疹瘤氣結核拂鬱甚者皆熱五臟不和九竅不通六腑不和留結為癰近於火氣微熱則癢熱甚則痛附近則灼而為瘡皆火之用也人之瘡腫因內熱外虛所生也為風濕之所乘則生瘡腫然肺主氣候於皮毛脾主肌肉氣虛則膚腠開為風濕所乘脾氣濕而內熱即生瘡也腫者由寒熱毒氣客於經絡使血澀而不通壅結成腫風邪不作即無頭無根寒血相搏作者即有頭有根壅盛則為膿赤根腫則風氣流潰也瘡以痛癢痛則為實癢則為虛非虛為寒也正謂熱之微甚也癢則美疾也故火旺於夏而萬物蕃鮮榮美也灸之以火實之以湯而其癢轉甚者微熱之所使也癢去者謂熱令皮膚縱緩腠理開通陽氣得泄熱散而去或夏熱皮膚癢而以冷水沃之其癢不去謂寒能收斂腠理閉密陽氣鬱結不能散越怫熱內作故也瘡瘍皆為火熱而反腐出膿水者猶穀肉果菜熱極則腐爛而潰為汙水也潰而腐爛者水之化也癰淺而大疽深而惡熱勝血則為癰膿也瘍有頭小瘡也疹浮而小癮疹也瘤氣赤瘤丹熛熱勝氣火之色也沒藥膏治一切癰疽發背瘡癤傷折蹊跌壞膿生肌止痛又貼灸瘡極妙麒麟竭明乳香沒藥以上各一兩研當歸去蘆木鱉子仁研杏仁以上各五錢油頭髮二兩黃丹六兩上先用油一斤石器內或沙鍋內露天底煉油令熟先下木鱉子當歸杏仁頭髮慢火熬黃焦油耗五分離火用綿離渣不用再入鍋下黃丹以新柳篦子十條旋換攪不住手候黑色滴在水中成珠子硬軟得所取下火入三味研藥再攪勻瓷盒內盛放地上以盆合一宿出火毒用時或帛上或紙上攤一日一換必效散治久患瘰癧不效服此藥取效如神南硼砂二錢五分輕粉一錢麝香五分斑蝥四十個去頭翅巴豆五個去皮心膜白檳榔一個上同研極細取雞子清二個去黃調藥勻卻傾在雞子殼內濕紙數重糊定無令透氣坐飯甑內與飯一處蒸飯熟取藥曝乾研極細末用時相度虛實虛人每服半錢實人每服一錢並用炒生薑酒下五更初服藥至平明取下惡物如覺小腹內疼痛便用苘麻子燒灰入沒藥等分同研細用茶調下一錢便入大腸其取下惡物如爛肉老鼠兒及新成卵內雀兒是藥之效婦人有胎不可服烏金散治癰癤腫硬無頭不變色者米粉四兩蔥白一兩細切上同炒黑色杵為細末每用看多少醋調攤紙上貼病處一伏時換一次以消為度抵聖丸治男子婦人頭面手足虛腫苦葶藶不以多少於火上隔紙炒過上杵為細末棗肉為丸如小豆大每服十丸煎麻子湯下食前日進三服五七日小便多腫消為效如喘嗽煎桑白皮湯下忌生冷醋滑物及鹽須另丸一等小丸兒與小兒服看大小加減與服煎棗肉湯下應效散治氣瘻疳瘡多年不效者地骨皮不以多少冬月自取只要皮陰乾上杵為細末每用紙捻蘸紝瘡口內頻用自然生肉更用米飲調二錢無時日進三服又名托裡散白金散治風攻注毒遍身及手足生熱瘡疼痛有黃水出桂府滑石上為細末先用虎杖甘草豌豆各等分約半兩許二碗水煎上項三味至一碗去渣微熱淋洗瘡水冷拭乾上糝滑石末令通便睡至明決愈如聖散治渾身搔癢抓之成瘡及癮疹之類蠶砂一升上用水二斗煎至一斗濾去渣夜臥避風處淋洗水冷即拭乾便睡大蛾散治刀斧傷止血定痛生肌晚蠶蛾不以多少上為細末每用藥貼於瘡口上用綿裹不須再動一上便可必效散治蜘蛛咬著疼痛鹽豉炒乾上為細末每用油調塗之必效蛤粉散治湯火燒燙瘡蛤礪燒赤放冷上研如粉每用油調塗之日三次治小兒丹瘤木鱉子新者去殼上研如泥淡醋調敷之一日三五次便效治小兒疳口瘡天南星一個去皮上為末好醋調攤在紙上男左女右貼在腳心底以帛系定三日外取了以溫水洗盡腳下藥治破傷風並洗頭風藥麻黃一錢去節蠍稍二錢五分蠻薑草烏頭黑附子炮去皮白附子天麻烏梢蛇好酒浸二夜去骨火上炙黃色川芎以上各五錢上為細末每服一錢熱酒調下日進三五服重者三五日必效此證只宜早治但邪氣入臟則難治有四死證不可治一頭面青黑色二額上有汗珠不流三眼小目瞪四身上有汗出如油烏龍丸治遍身風瘡搔癢疥癬等疾服之消風散熱利膈化痰唾治肺氣不和此藥推陳致新去腸垢治證甚多要能用度皂角肥者不以多少炙刮去皮弦捶碎甜水揉取濃汁去渣銀石器內熬成膏另放之黑牽牛不以多少微炒令香熟碾取頭末上將藥末與皂角膏和丸如梧桐子大每服三五十丸氣虛者一二十丸食後溫水送下無病氣實人一二個月頓一服取利三五行不傷正氣身體輕健肌膚光澤永無風痰疥癬之疾紫參丸治熱毒瘰癧腫毒未成者內消已潰者行膿止痛散腫毒麝香另研膩粉以上各三錢紫參苦參炒以上各一兩丹參一兩五錢連翹二兩滑石二兩五錢上為末別用玄參一斤搗碎以酒三碗浸三日揉取汁去渣用皂角子三百個煨熟為末用玄參酒熬皂角子末成膏和前藥丸如梧桐子大每服一丸以黃耆湯下一日加一丸至患人歲數即住如四十則二十每日減一丸其瘡自干已結者內消也服此藥大有神效萬靈丸治腦背疽並一切惡瘡初覺一二日硃砂血竭蓮蕊以上各等分麝香少許上為細末酒糊為丸如黃米大每服七丸溫酒送下瘡在上食後在下食前不過二服即效治眼治昏澀退翳膜椒四兩去子合者不用甘菊花二兩五錢干熟地黃二兩酒浸九蒸九曝上為細末煉蜜為丸如梧桐子大每服三十丸食後細嚼新折米十餘粒送下治吹奶出仲寬方治吹奶及一切惡瘡初覺一二日立效生薑一兩去皮大黃甘草以上各五錢栝蔞一個去皮上共搗作一塊以水半碗同煎至七分濾去渣入沒藥乳香末共二錢半通作一服治痔瘡雄黃五分細研五靈脂去石燒過去煙五倍子炮過以上各一錢沒藥二錢五分明淨者白礬半飛半生上為細末研令極細用紙花子貼瘡口上洗痔防風當歸川芎以上各等分上三味銼細煎水去渣令熱溫淋洗瘡用軟帛印干敷前藥寸金丹二名返魂丹三名再生丸四名追命丹五名延壽丸六名來蘇丸七名知命丸八名得道丸非人勿示此方若有人患瘡身未爛者與三丸服之咽下便活如口噤但斡開牙關研下三丸灌下喉中立生此方治發背腦疽癰腫遍身附骨腫痛先覺時飲水口中煩渴發熱四肢沉重身體壯熱麝香一分南乳香烏金石輕粉雄黃狗寶沒藥以上各一錢蟾酥二錢粉霜黃蠟以上各三錢硇砂五錢鯉魚膽乾用狗膽以上各一個乾用金頭蜈蚣七條全者酥炙黃色頭首兒孩兒乳一合上件為末除黃蠟乳汁二味熬成膏子同和丸如緑豆大小兒丸如芥子大每服一丸病重者加三丸白丁香七個研爛新汲水調送下用衣服蓋之睡勿令透風汗出為度大段疼痛如無頭瘡腫不過三服立效服藥後食白粥苽𧆌就服大妙牙疳藥此藥是京兆惠民局見行經驗方治大人小兒揀信青黛輕粉以上各一錢麝香五分上同為細末用小油調薄攤紙上用水捶捶實收起每用臨臥以漿水洗淨印干可瘡口大小以藥紙封之至曉去藥紙漱淨勿令咽下大者不過三上必效回瘡蟾酥錠子陝西醫局提舉馬雲卿親傳經驗方治疔瘡毒氣攻心欲死以針刺其瘡向心行處但覺痛有血處下錠子若纍刺至心側近皆不痛無血者急針百會穴痛有血者下錠子若無血以親人熱血代之猶活三四況瘡初發無有不效大抵疔瘡生於四肢及胸背頭項骨節間唯胸背頭項最急初生痛癢不常中陷如疔蓋撼之有根壯熱噁心是也天南星疑冬花巴豆仁黃丹白信以上各一錢獨活五分斑蝥去頭足十個上為極細末用新蟾酥和藥如黍米大捻作錠子每遇疔瘡先以針刺其瘡必不知痛有血出者下錠子如覺痛不須再用若更不知痛再隨瘡所行處迎奪刺之至有血知痛即止其元瘡亦覺疼痛以膏藥敷之膿出自瘥用錠子法度以銀作細筒子一個約長三寸許隨針下至瘡痛處復以細銀絲子內藥於筒內推至痛處乳香托裡散同前所傳治一切瘡腫疼痛不可忍如少壯氣實者先疏利後服之大效罌粟殼去槅蒂萼蜜炒三兩當歸芍藥川芎以上五錢乳香沒藥以上各一錢上為粗末每服五錢水一盞半煎至十分去渣湯服病在上者食後病在下者食前若未止即再服四聖旋丁散各醫祕傳經驗方治疔瘡生於四肢其勢微者先以好醋調藥塗上以紙封之次服內托裡之藥其疔自旋出根巴豆仁五分白殭蠶輕粉硇砂以上各二錢五分上為細末醋調用之天丁散同前祕傳經驗方治一切疔瘡及諸惡瘡初生以藥塗之急服托裡內消山丹花蕊香白芷以上各二錢牛蒡子根春採去皮天丁乃皂角刺蒼耳芽大力子以上各五錢雄黃一兩上五月五日受氣修合為細末每用好醋塗紙封之疔瘡上有黑甲者必須胡桃油浸次塗之自可萬應膏同前所傳治一切瘡瘍初生腫焮甚者無問大小以膏可腫痕貼之煎蔥白水熱淋兩焮時良久再淋腫消為度如瘡老不能瘥者亦收斂聚膿決然早瘥黃柏芍藥白芷黃耆木鱉仁杏仁當歸白芨生地黃官桂玄參去皮銼碎沒藥乳香以上各五錢研白蘞黃蠟以上各一兩黃芩大黃以上各二兩黃丹一斤芝麻油二斤八兩上件十四味入油內浸一宿絶早入沙鍋慢火熬用生柳條攪至申時以焦褐色出火去粗渣又以重綿濾過入丹再熬旋滴水中成珠子不散者出火毒絶煙入乳香沒藥黃蠟攪勻用瓷器收貯於土內埋七日取出攤用治小兒面湮瘡俗云煉銀瘡者是母受胎之日食酸辣及邪味過度多生此瘡百藥煎五錢生白礬二錢上為細末小油調旋搽之神效治赤白口瘡大人飢渴不時小兒失驚即生口瘡生白礬二錢上噙漱之從瀝頑涎立效治乾溼疥癬此是肺受邪毒運於四肢久而不散以生肉蠹硫黃二兩生白礬八錢上為細末油調火炙抓破塗之立效治湯火燒燙無問新舊青槐枝一兩銼碎緑豆粉一兩炒黃色輕粉一錢上同為細末油調塗之止痛減毒治破傷風手足顫掉不已者硃砂另研南星去臍獨活去皮以上各二錢人手足指甲燒絶煙六錢上為細末分作三服酒調服之立效治破傷無問新舊石灰上用一味驗瘡口大小盡干塗之不須封裹神效治風狗咬破傷風此病非為小可乃九死一生之病可急用之好斑蝥七個去翅足上為細末酒調服之於小便盆內見衣沫似狗形者為效如無再服七次雖無狗形亦不再發也此方纍試經驗今附於此論炮製諸藥及單方主療瘡腫法夫藥者治病之物蓋流變在乎病主治在乎藥制用在乎人三者不可闕一也凡用一味炮炙修制及單方主療該引方書出處不必隨方標寫硃砂須研細水飛濾干若入膏中者待熬膏成稍凝冷即下急攪勿令沉聚大凡石類一一如此雲母即須用煉成熟粉曾經婦人手拈者不效聖惠方治湯火瘡羊髓和膏塗之神良千金方如治金瘡及諸惡瘡依上塗敷大效礬石即白礬凡用須木炭火上枯汁盡主陰蝕惡瘡去鼻中息肉生含咽津治急喉閉肘後方治耳中卒腫痛或有膿水者以筒吹一字於耳中以綿塞之立效又治諸毒蟲惡獸咬傷敷之則瘥千金方以醋煮湯潰蠍螫立瘥王氏博濟治驢馬汁毒傷人瘡腫痛和黃丹敷之靈苑方治傷折瘡腫以沸湯投枯礬漬浴之御藥院方治陰汗以枯礬投沸湯中浴之水銀主疥瘻痂傷白禿入膏令膏冷凝下之攪令勻散如星勿令沉聚水銀粉即輕粉主瘰癧殺疥癬蟲酒齄風以羊髓和如膏塗及貼臁瘡一上可石灰主疥癬骨疽金瘡風化者良外臺祕要方治風疹以漿水調熱掃之隨手瘥孫真人治疥淋石灰水溫洗之千年老者尤佳白麥飯石即粗理黃石曾磨刀者佳凡用須用釅醋淬之令屑落醋中者良亦單用治發背神農本草曰大凡石類多主癰疽花蕊石主金瘡止血合硫黃木炭火炒良或只刮花蕊石末效黃耆主癰疽久敗瘡排膿止痛兼五痔鼠瘻止渴聖惠千金外臺祕要方治發背腦疽托裡止渴用黃耆六兩甘草一兩銼細水煎溫服無時大效葈耳即蒼耳千金翼方疔腫用根莖葉炒灰存性為末醋泔澱和如泥塗之一日三易之三日腫消根疔自拔出亦治諸腫掃之尋瘥麻黃凡用根節煮三沸掠去沫曬乾銼黃芩凡用去腐蘆揀細實者佳梅師方治諸丹作末水調掃之亦治湯火傷烏頭附子凡用須炮裂去皮臍半夏凡用湯洗七次去滑羊蹄根主幹癬疥頭禿取根齧塗之效簡要濟衆方治癬瘡久不瘥取新者絞汁和膩粉為膏塗之千金聖惠外臺等方皆治癬和醋或白礬或硫黃塗之愈狼毒主癰疽惡瘡鼠瘻聖惠方治癬瘡積年搔之黃汁出癢痛以末敷之或豬膏和塗瘥芭蕉根主瘡腫搗根汁塗之良百一方治發背根汁塗之土青木香即馬兜鈴根治頭風搔癢禿瘡連翹主寒熱鼠瘻癰疽惡瘡癭瘤同甘草服食蒲公草主乳癰煮汁飲之自消梅師方敷之亦消滑石本草不言療瘡腫本體較治諸瘡久不愈消熱毒腫及金瘡血不止湯火燒瘡用之尤良白石英主肺癰吐膿咳嗽及膈上風熱痰肺瘻消渴陰瘻補五臟赤石脂治瘡疽痔瘻瀉利加芎末等分粥飲調服一錢重神效寒者加乾薑服白石脂治癰疽排膿生肌新生兒臍濕雄黃主寒熱鼠瘻惡瘡疽痔死肌疥癬硫黃主女人陰蝕疽痔惡瘡疥癬殺蟲雌黃主惡痂疥頭禿下部慝瘡殺蟲磁石消癰腫主鼠瘻頸核喉痛密陀僧主金瘡止血口瘡疳瘻面上瘢皯伏龍肝糝主惡瘡水調掃丹腫酒調封發背令內消礜石主寒熱鼠瘻惡瘡蝕肌死薑石搗末雞子清調敷疔腫丹瘤乳癰粗理黃石堪作碓碾者即磨刀粗石齊馬嗣明治楊遵彥發背取此石猛火煅赤投釅醋中因有屑落取為末醋熬如糊厚塗立愈大凡石頭多主癰疽爐甘石主愈瘡止血治目赤瘡燈心主破傷血出每用貼破上封之立瘥槐根皮主痔及白皮煎湯熏浴良入荊芥尤妙地骨皮主疽瘡經年以粗皮煎湯洗之細沫白穰別碾糝之即瘥黃柏主瘡腫神良每用去粗皮塗蜜炙銼諸方用作湯漬陰瘡良搗末蜜水調敷腫枳殼凡用須麩炒去穰銼枳實亦同厚朴凡用須去粗皮生薑塗制炙微焦銼皂角凡用須不蛀者去黑皮弦子酥炙黃色銼木鱉子凡用去殼主惡瘡毒腫孫用和方治痔用仁三五枚研如泥以沸湯浸用汗先熏但通手即浴洗日三度楸樹白皮單用熬膏貼癰疽惡瘡疳瘻痔疾用其白馬牙燒灰治發背初生用糝瘡頭上以膏封之兔頭連皮骨臘月細銼瓶中封之百日塗發腦疽發背惡瘡出百一方兔腹下白毛治湯火瘡已破者先用膠水掃之後用兔白毛貼之毛落平復勝金方治痔用玩月砂即兔糞也和乳香末酒調三錢溫服日三服即瘥蜜凡煉須煎令沸掠去沫外臺治陰頭生瘡以蜜煎甘草末塗之神效肘後方單用塗湯火瘡牡蠣凡用木炭灰炒通赤濕地上放經宿方用經驗方治瘰癧用牡蠣四兩玄參三兩為末糊丸如梧桐子大酒服三五十丸食後服藥盡患亦除根集驗方治一切癰腫水調牡蠣粉掃之干即再掃即消名拔毒散初虞世治瘰癧用和甘草末茶調五錢服之神效大驗蛇蛻皮諸方用治疔雜惡瘡十年不較者全用炒存性豬膏和塗之其驗神效蜘蛛聖惠治瘰癧不問新舊或成瘻者曬乾為末酥和如糊貼之日三度大效千金治發背瘡亦治鼠瘻神良談氏治贅瘤悁目以網絲作線際根系之一宿自落蜣螂聖惠治一切惡瘡端午日收干為末者油調敷之神效子母祕録治忽得惡瘡未辨識者取新者絞汁敷其上大效古今諸方治疔瘡欲死者取蜣螂心腹下度取之稍白者是以針刺疔瘡當心及四釁以心塗貼之百苦立已經宿其疔自拔出大忌食羊肉多不效陳橘皮凡用溫水浸去白青橘皮亦然枇杷葉主嘔逆下氣凡用去毛刺甘草湯洗三葉重一兩者佳桃杏仁凡用須湯浸去皮尖雙仁炒銼或研無心草凡用去蘆苗煎洗甲瘭疽神效防風凡用去叉蘆藜蘆凡用去苗犀角凡用生不曾見火者即鎊錯為末茯苓凡用去粗皮白者佳芍藥亦用白者佳牽牛子凡用黑成熟者微炒假如一斤取頭末四兩
